services:
  - type: web
    name: alumni-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alumni-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: alumni-db
    plan: free
